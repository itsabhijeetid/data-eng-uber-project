<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Booking Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #f5f5f52b;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0972e4;
        }
        p {
            color: #a0c1e6;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #0f0f0fdb;
            border: none;
            border-radius: 5px;
            text-decoration: none;
        }
        .button:hover {
            background-color: #070707;
            padding: 11px 21px;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Real-Time Ride Intelligence Platform</h1>
        <p>Book your ride with us and enjoy a seamless experience!</p>
        <a href="/book" class="button">Book a Ride</a>
    </div>
</body>
</html>
